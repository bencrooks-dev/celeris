name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: core (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (dev extras)
        run: pip install -e .[dev]
      - name: Run core tests (exclude llvmlite/native)
        run: pytest -m "not needs_llvmlite and not needs_native" -q

  llvm:
    name: llvm backend + differential
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (dev + llvm extras)
        run: pip install -e .[dev,llvm]
      - name: Run llvmlite-marked tests
        run: pytest -m "needs_llvmlite" -q
      - name: Run differential harness (oracle vs llvmlite backend)
        run: pytest tests/test_differential.py -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
